{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password | AI Based Pharmacy System</title>
  <link rel="stylesheet" type="text/css" href="{% static 'css/project-polish.css' %}">
</head>
<body>
  <main class="auth-page">
    <form class="auth-card" method="POST">
      {% csrf_token %}
      <div class="auth-brand">
        <div class="auth-eyebrow">Reset Password</div>
        <h1 class="auth-title">Create New Password</h1>
        <p class="auth-subtitle">Choose a new password for your supplier account.</p>
      </div>
      <div class="field">
        <label for="id_password">New Password</label>
        <input type="password" id="id_password" name="password" required>
      </div>
      <div class="action-row">
        <button class="auth-submit" type="submit">Reset Password</button>
      </div>
    </form>
  </main>
</body>
</html>
